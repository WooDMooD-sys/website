<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showrooms — WooDMooD</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background: #000;
    }

    /* ── Fixed header ── */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 8vw;
    }

    .hamburger {
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; gap: 5px; padding: 4px;
      pointer-events: all;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: rgba(255,255,255,0.7); transition: background 0.2s;
    }
    .hamburger:hover span { background: rgba(255,160,50,0.9); }

    .brand {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 18px; font-weight: normal;
      color: rgba(255,255,255,0.7); letter-spacing: 0.04em;
    }

    /* ── Side nav drawer ── */
    .nav-drawer {
      position: fixed; top: 0; left: -300px;
      width: 280px; height: 100vh;
      background: #0c0c0c;
      border-right: 1px solid rgba(255,160,50,0.12);
      z-index: 200;
      transition: left 0.35s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column; padding: 32px 0;
    }
    .nav-drawer.open { left: 0; }

    .nav-close {
      background: none; border: none;
      color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer;
      align-self: flex-end; margin-right: 28px; margin-bottom: 32px;
      line-height: 1; transition: color 0.2s;
    }
    .nav-close:hover { color: rgba(255,160,50,0.9); }

    .nav-drawer ul { list-style: none; display: flex; flex-direction: column; }
    .nav-drawer ul li a {
      display: block; padding: 16px 32px;
      font-family: 'Georgia', serif; font-size: 15px;
      color: rgba(255,255,255,0.6); text-decoration: none;
      letter-spacing: 0.12em; text-transform: uppercase;
      transition: color 0.2s, padding-left 0.2s;
    }
    .nav-drawer ul li a:hover { color: rgba(255,160,50,0.9); padding-left: 40px; }
    .nav-drawer ul li a.active { color: rgba(255,160,50,0.9); }

    .nav-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 150;
      opacity: 0; pointer-events: none; transition: opacity 0.35s ease;
    }
    .nav-backdrop.open { opacity: 1; pointer-events: all; }

    /* ── Mini hero ── */
    .mini-hero {
      position: relative; width: 100%;
      height: 45vh; min-height: 220px; overflow: hidden;
    }
    .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover; z-index: 0;
    }
    .dark-overlay {
      position: absolute; inset: 0; background: #000; z-index: 1;
    }

    /* ── Page content ── */
    .page-content {
      background: #080808;
      border-top: 1px solid rgba(255,160,50,0.1);
      padding: 72px 8vw 120px;
    }

    .page-content-inner { max-width: 760px; }

    .page-title {
      font-family: 'Georgia', serif;
      font-size: 32px;
      font-weight: bold;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 60px;
    }

    /* ── Location rows ── */
    .location-list {
      border-top: 1px solid rgba(255,160,50,0.1);
    }

    .location-row {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 40px;
      align-items: start;
      padding: 36px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .location-row:last-child { border-bottom: none; }

    .location-label {
      font-family: 'Georgia', serif;
      font-size: 12px;
      font-weight: bold;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding-top: 3px;
    }

    .location-address {
      font-family: 'Georgia', serif;
      font-size: 15px;
      line-height: 1.85;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.03em;
    }

    .location-city {
      color: rgba(255,255,255,0.7);
      font-weight: bold;
      font-style: normal;
    }

    /* ── Map ── */
    .map-wrap {
      margin-top: 28px;
      border: 1px solid rgba(255,160,50,0.15);
      border-radius: 4px;
      overflow: hidden;
      height: 420px;
    }

    @media (max-width: 560px) {
      .location-row { grid-template-columns: 1fr; gap: 12px; }
      .map-wrap { height: 300px; }
    }
  </style>
</head>
<body>

  <!-- Fixed header -->
  <header class="site-header">
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <span class="brand">WooDMooD</span>
  </header>

  <!-- Side navigation drawer -->
  <nav class="nav-drawer" id="navDrawer" aria-hidden="true">
    <button class="nav-close" id="navClose" aria-label="Close menu">✕</button>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="histoire.html">Histoire</a></li>
      <li><a href="produits.html">Produits</a></li>
      <li><a href="showrooms.html" class="active">Showrooms</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
  <div class="nav-backdrop" id="navBackdrop"></div>

  <!-- Mini hero with fire + WOOD MOOD -->
  <section class="mini-hero">
    <video class="bg-video" src="5659682-hd_1920_1080_24fps.mp4" autoplay loop muted playsinline></video>
    <div class="dark-overlay"></div>
  </section>

  <!-- Showrooms content -->
  <section class="page-content">
    <div class="page-content-inner">

      <h1 class="page-title">Showrooms</h1>

      <div class="location-list">

        <div class="location-row">
          <span class="location-label">Localisations</span>
          <div class="location-address">
            <span class="location-city">Angers</span><br>
            6 rue Montrieux<br>
            49100 ANGERS
          </div>
        </div>

        <div class="location-row">
          <span class="location-label"></span>
          <div class="location-address">
            <span class="location-city">Orléans</span><br>
            Château de Cormes, rue de Cormes<br>
            45590 ST CYR EN VAL
          </div>
        </div>

        <div class="map-wrap" id="showroomMap"></div>

      </div>

    </div>
  </section>

  <script>
    /* ── Canvas text mask (mini-hero) ── */
    function applyTextMask() {
      const overlay = document.querySelector('.dark-overlay');
      const dpr = window.devicePixelRatio || 1;
      const w   = window.innerWidth;
      const h   = document.querySelector('.mini-hero').offsetHeight;

      const canvas  = document.createElement('canvas');
      canvas.width  = w * dpr;
      canvas.height = h * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = 'destination-out';

      const fontSize   = Math.min(160, Math.max(50, Math.min(w * 0.12, h * 0.28)));
      const lineHeight = fontSize * 0.85;
      const topY       = h * 0.5 - (lineHeight * 2 * 0.54);
      const centerX    = w * 0.5;

      ctx.font         = `${fontSize}px Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'top';
      ctx.fillStyle    = 'black';

      const xStretch = 1.45;
      ctx.save();
      ctx.scale(xStretch, 1);
      ctx.fillText('WOOD', centerX / xStretch, topY);
      ctx.fillText('MOOD', centerX / xStretch, topY + lineHeight);
      ctx.restore();

      const url = canvas.toDataURL('image/png');
      overlay.style.webkitMaskImage  = `url(${url})`;
      overlay.style.maskImage        = `url(${url})`;
      overlay.style.webkitMaskSize   = '100% 100%';
      overlay.style.maskSize         = '100% 100%';
      overlay.style.webkitMaskRepeat = 'no-repeat';
      overlay.style.maskRepeat       = 'no-repeat';
    }
    document.fonts.ready.then(applyTextMask);
    window.addEventListener('resize', applyTextMask);

    /* ── Hamburger / drawer ── */
    const hamburger   = document.getElementById('hamburger');
    const navClose    = document.getElementById('navClose');
    const navDrawer   = document.getElementById('navDrawer');
    const navBackdrop = document.getElementById('navBackdrop');

    function openNav() {
      navDrawer.classList.add('open');
      navBackdrop.classList.add('open');
      navDrawer.setAttribute('aria-hidden', 'false');
    }
    function closeNav() {
      navDrawer.classList.remove('open');
      navBackdrop.classList.remove('open');
      navDrawer.setAttribute('aria-hidden', 'true');
    }
    hamburger.addEventListener('click', openNav);
    navClose.addEventListener('click', closeNav);
    navBackdrop.addEventListener('click', closeNav);
  </script>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('showroomMap', { scrollWheelZoom: false });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd', maxZoom: 19
    }).addTo(map);

    const pinIcon = L.divIcon({
      className: '',
      html: '<div style="width:14px;height:14px;background:rgba(200,100,10,0.95);border:2px solid rgba(255,160,50,0.6);border-radius:50%;box-shadow:0 0 8px rgba(180,80,0,0.5);"></div>',
      iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
    });

    const showrooms = [
      { latlng: [47.4659, -0.5580], city: 'Angers',  addr: '6 rue Montrieux, 49100 ANGERS' },
      { latlng: [47.8590,  1.9437], city: 'Orléans', addr: 'Château de Cormes, rue de Cormes<br>45590 ST CYR EN VAL' }
    ];

    showrooms.forEach(s => {
      L.marker(s.latlng, { icon: pinIcon })
       .addTo(map)
       .bindPopup(`<strong>${s.city}</strong><br>${s.addr}`);
    });

    map.setView([48.5, 1.8], 6);
  </script>

</body>
</html>
