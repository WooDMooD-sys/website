<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showrooms — WooDMooD</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background: #000;
    }

    /* ── Fixed header ── */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 15vh;
      z-index: 100;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      padding: 0 6vw;
      background: rgba(0, 0, 0, 0.88);
      border-bottom: 1px solid rgba(255, 160, 50, 0.12);
    }

    .brand-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
    }

    .brand-logo {
      height: clamp(32px, 5vh, 58px);
      width: auto;
      display: block;
      filter: invert(1) opacity(0.68);
    }

    .brand-name {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-weight: normal;
      color: rgba(255, 255, 255, 0.68);
      white-space: nowrap;
      letter-spacing: 0.08em;
    }

    .header-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(22px, 3.8vw, 60px);
    }

    .wm-macaron-text {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      margin-right: -2vw;
    }

    .wm-macaron-text span {
      font-family: 'Montserrat', sans-serif;
      font-weight: bold;
      color: rgba(255, 160, 50, 0.88);
      letter-spacing: 0.06em;
      font-size: clamp(10px, 1.1vw, 15px);
      white-space: nowrap;
      text-align: right;
    }

    .header-nav a {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(13px, 1.35vw, 19px);
      font-weight: normal;
      color: rgba(255, 255, 255, 0.68);
      text-decoration: none;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .header-nav a:hover { color: rgba(255, 160, 50, 0.9); }
    .header-nav a.active { color: rgba(255, 160, 50, 0.9); }

    /* ── Page content ── */
    .page-content {
      background: #000;
      border-top: 1px solid rgba(255,160,50,0.1);
      padding: 40px 8vw 120px;
      padding-top: 15vh;
    }

    .page-content-inner { max-width: 760px; }

    .page-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 32px;
      font-weight: bold;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ── Location rows ── */
    .location-list {
      border-top: 1px solid rgba(255,160,50,0.1);
    }

    .location-row {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 40px;
      align-items: start;
      padding: 36px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .location-row:last-child { border-bottom: none; }

    .location-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: bold;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding-top: 3px;
    }

    .location-address {
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      line-height: 1.85;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.03em;
    }

    .location-city {
      color: rgba(255,255,255,0.7);
      font-weight: bold;
      font-style: normal;
    }

    /* ── Map ── */
    .map-wrap {
      margin-top: 28px;
      border: 1px solid rgba(255,160,50,0.15);
      border-radius: 4px;
      overflow: hidden;
      height: 420px;
    }

    /* ── À venir banner ── */
    .avenir-banner {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
      padding: 9px 20px;
      border: 1px solid rgba(255, 160, 50, 0.35);
      border-radius: 2px;
      background: rgba(255, 160, 50, 0.04);
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-style: italic;
      letter-spacing: 0.22em;
      color: rgba(255, 160, 50, 0.72);
      text-transform: uppercase;
      animation: avenir-pulse 3s ease-in-out infinite;
    }
    .avenir-banner::before,
    .avenir-banner::after {
      content: '—';
      opacity: 0.45;
      font-style: normal;
      letter-spacing: 0;
    }
    @keyframes avenir-pulse {
      0%, 100% { border-color: rgba(255,160,50,0.35); color: rgba(255,160,50,0.72); }
      50%       { border-color: rgba(255,160,50,0.65); color: rgba(255,160,50,0.95); }
    }

    .page-intro {
      font-family: 'Montserrat', sans-serif;
      font-size: 17px;
      line-height: 1.9;
      color: rgba(255,255,255,0.45);
      max-width: 780px;
      margin-bottom: 64px;
    }


    @media (max-width: 560px) {
      .location-row { grid-template-columns: 1fr; gap: 12px; }
      .map-wrap { height: 300px; }
    }

    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px;
      z-index: 200;
    }
    .nav-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: rgba(255,255,255,0.75);
      border-radius: 2px;
    }

    @media (max-width: 768px) {
      .site-header { height: 60px; padding: 0 4vw; }
      .brand-logo { height: 28px; }
      .brand-name { font-size: 13px !important; }
      .wm-macaron-text { display: none; }
      .nav-toggle { display: flex; }
      .header-nav {
        display: none;
        position: fixed;
        top: 60px; left: 0; right: 0;
        background: rgba(0,0,0,0.96);
        flex-direction: column;
        align-items: center;
        gap: 0; padding: 0;
        z-index: 150;
        border-top: 1px solid rgba(255,160,50,0.2);
      }
      .header-nav.open { display: flex; }
      .header-nav a {
        width: 100%; text-align: center;
        padding: 18px 0; font-size: 14px;
        letter-spacing: 0.18em;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
    }
  </style>
</head>
<body>

  <!-- Fixed header -->
  <header class="site-header">
    <a href="index.html" class="brand-wrap" id="brandWrap">
      <img src="logo.png" class="brand-logo" id="brandLogo" alt="WooDMooD logo">
      <span class="brand-name" id="brandName">WooDMooD</span>
    </a>
    <nav class="header-nav" id="headerNav">
      <a href="histoire.html">Histoire</a>
      <a href="produits.html">Produit</a>
      <a href="showrooms.html" class="active">Showrooms</a>
      <a href="contact.html">Contact</a>
    </nav>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="wm-macaron-text"><span>Poêles à Bûches</span><span>Autonomes et Connectés</span></div>
  </header>

  <!-- Showrooms content -->
  <section class="page-content">
    <div class="page-content-inner">

      <h1 class="page-title">Showrooms</h1>

      <p class="page-intro">Voir, toucher, comprendre le fonctionnement du produit ou passer une commande pour votre poêle</p>

      <div class="location-list">

        <div class="location-row">
          <span class="location-label">Localisations</span>
          <div class="location-address">
            <span class="location-city">Angers</span><br>
            6 rue Montrieux<br>
            49100 ANGERS<br>
            sur rendez-vous au 06 50 77 16 60
          </div>
        </div>

        <div class="location-row">
          <span class="location-label"></span>
          <div class="location-address">
            <span class="location-city">Orléans</span><br>
            <span class="avenir-banner">À venir</span>
          </div>
        </div>

        <div class="map-wrap" id="showroomMap"></div>

      </div>

    </div>
  </section>

  <script>
    document.getElementById('navToggle').addEventListener('click', function() {
      document.getElementById('headerNav').classList.toggle('open');
    });
    document.getElementById('headerNav').querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() { document.getElementById('headerNav').classList.remove('open'); });
    });
  </script>
  <script>
    function fitBrandName() {
      const logo = document.getElementById('brandLogo');
      const name = document.getElementById('brandName');
      const logoW = logo.offsetWidth;
      if (!logoW) return;
      let lo = 6, hi = 80, mid;
      name.style.letterSpacing = '0.06em';
      for (let i = 0; i < 20; i++) {
        mid = (lo + hi) / 2;
        name.style.fontSize = mid + 'px';
        if (name.offsetWidth < logoW) lo = mid; else hi = mid;
      }
    }
    if (document.readyState === 'complete') fitBrandName();
    else window.addEventListener('load', fitBrandName);
    window.addEventListener('resize', fitBrandName);
  </script>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('showroomMap', { scrollWheelZoom: false });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd', maxZoom: 19
    }).addTo(map);

    const pinIcon = L.divIcon({
      className: '',
      html: '<div style="width:14px;height:14px;background:rgba(200,100,10,0.95);border:2px solid rgba(255,160,50,0.6);border-radius:50%;box-shadow:0 0 8px rgba(180,80,0,0.5);"></div>',
      iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
    });

    const showrooms = [
      { latlng: [47.4659, -0.5580], city: 'Angers',  addr: '6 rue Montrieux, 49100 ANGERS' },
      { latlng: [47.8590,  1.9437], city: 'Orléans', addr: 'Château de Cormes, rue de Cormes<br>45590 ST CYR EN VAL' }
    ];

    showrooms.forEach(s => {
      L.marker(s.latlng, { icon: pinIcon })
       .addTo(map)
       .bindPopup(`<strong>${s.city}</strong><br>${s.addr}`);
    });

    map.setView([48.5, 1.8], 6);
  </script>

</body>
</html>
