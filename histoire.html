<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histoire — WooDMooD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background: #000;
    }

    /* ── Fixed header ── */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 8vw;
    }

    .hamburger {
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; gap: 5px; padding: 4px;
      pointer-events: all;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: rgba(255,255,255,0.7); transition: background 0.2s;
    }
    .hamburger:hover span { background: rgba(255,160,50,0.9); }

    .brand {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 18px; font-weight: normal;
      color: rgba(255,255,255,0.7); letter-spacing: 0.04em;
    }

    /* ── Side nav drawer ── */
    .nav-drawer {
      position: fixed; top: 0; left: -300px;
      width: 280px; height: 100vh;
      background: #0c0c0c;
      border-right: 1px solid rgba(255,160,50,0.12);
      z-index: 200;
      transition: left 0.35s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column; padding: 32px 0;
    }
    .nav-drawer.open { left: 0; }

    .nav-close {
      background: none; border: none;
      color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer;
      align-self: flex-end; margin-right: 28px; margin-bottom: 32px;
      line-height: 1; transition: color 0.2s;
    }
    .nav-close:hover { color: rgba(255,160,50,0.9); }

    .nav-drawer ul { list-style: none; display: flex; flex-direction: column; }
    .nav-drawer ul li a {
      display: block; padding: 16px 32px;
      font-family: 'Georgia', serif; font-size: 15px;
      color: rgba(255,255,255,0.6); text-decoration: none;
      letter-spacing: 0.12em; text-transform: uppercase;
      transition: color 0.2s, padding-left 0.2s;
    }
    .nav-drawer ul li a:hover { color: rgba(255,160,50,0.9); padding-left: 40px; }
    .nav-drawer ul li a.active { color: rgba(255,160,50,0.9); }

    .nav-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 150;
      opacity: 0; pointer-events: none; transition: opacity 0.35s ease;
    }
    .nav-backdrop.open { opacity: 1; pointer-events: all; }

    /* ── Mini hero ── */
    .mini-hero {
      position: relative; width: 100%;
      height: 45vh; min-height: 220px; overflow: hidden;
    }
    .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover; z-index: 0;
    }
    .dark-overlay {
      position: absolute; inset: 0; background: #000; z-index: 1;
    }

    /* ── Histoire content ── */
    .page-content {
      background: #080808;
      border-top: 1px solid rgba(255,160,50,0.1);
      padding: 36px 8vw 120px;
    }
    .page-content-inner { max-width: 760px; }

    /* Bigger title */
    .page-title {
      font-family: 'Georgia', serif;
      font-size: 32px;
      font-weight: bold;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ── Story animation stage ── */
    .story-stage {
      position: relative;
      min-height: 520px; /* expanded by JS */
    }

    .story-line {
      position: absolute;
      display: block;
      font-family: 'Georgia', serif;
      font-size: 19px;
      line-height: 1.4;
      color: rgba(255,255,255,0.52);
      white-space: nowrap;
      will-change: transform;
      transform-origin: center center;
    }

    .story-finale {
      position: absolute;
      display: block;
      font-family: 'Georgia', serif;
      font-size: 20px;
      line-height: 1.4;
      color: rgba(255,160,50,0.78);
      white-space: nowrap;
      font-style: italic;
      letter-spacing: 0.04em;
      will-change: transform;
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <!-- Fixed header -->
  <header class="site-header">
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <span class="brand">WooDMooD</span>
  </header>

  <!-- Side navigation drawer -->
  <nav class="nav-drawer" id="navDrawer" aria-hidden="true">
    <button class="nav-close" id="navClose" aria-label="Close menu">✕</button>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="histoire.html" class="active">Histoire</a></li>
      <li><a href="produits.html">Produits</a></li>
      <li><a href="showrooms.html">Showrooms</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
  <div class="nav-backdrop" id="navBackdrop"></div>

  <!-- Mini hero with fire + WOOD MOOD -->
  <section class="mini-hero">
    <video class="bg-video" src="5659682-hd_1920_1080_24fps.mp4" autoplay loop muted playsinline></video>
    <div class="dark-overlay"></div>
  </section>

  <!-- Histoire content -->
  <section class="page-content">
    <div class="page-content-inner">
      <h1 class="page-title">Histoire</h1>
      <div id="storyStage" class="story-stage"></div>
    </div>
  </section>

  <script>
    /* ── Canvas text mask (mini-hero) ── */
    function applyTextMask() {
      const overlay = document.querySelector('.dark-overlay');
      const dpr = window.devicePixelRatio || 1;
      const w   = window.innerWidth;
      const h   = document.querySelector('.mini-hero').offsetHeight;

      const canvas  = document.createElement('canvas');
      canvas.width  = w * dpr;
      canvas.height = h * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = 'destination-out';

      const fontSize   = Math.min(160, Math.max(50, Math.min(w * 0.12, h * 0.28)));
      const lineHeight = fontSize * 0.85;
      const topY       = h * 0.5 - (lineHeight * 2 * 0.54);
      const centerX    = w * 0.5;

      ctx.font         = `${fontSize}px Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'top';
      ctx.fillStyle    = 'black';

      const xStretch = 1.45;
      ctx.save();
      ctx.scale(xStretch, 1);
      ctx.fillText('WOOD', centerX / xStretch, topY);
      ctx.fillText('MOOD', centerX / xStretch, topY + lineHeight);
      ctx.restore();

      const url = canvas.toDataURL('image/png');
      overlay.style.webkitMaskImage  = `url(${url})`;
      overlay.style.maskImage        = `url(${url})`;
      overlay.style.webkitMaskSize   = '100% 100%';
      overlay.style.maskSize         = '100% 100%';
      overlay.style.webkitMaskRepeat = 'no-repeat';
      overlay.style.maskRepeat       = 'no-repeat';
    }
    document.fonts.ready.then(applyTextMask);
    window.addEventListener('resize', applyTextMask);

    /* ── Story animation ── */
    const LINES = [
      'un besoin', 'une idée', 'un père', 'un fils', 'un projet',
      'un brevet', 'des partenaires', 'une start-up', 'un atelier',
      'un atelier plus grand', 'un prototype', 'puis 2', 'puis 3 et 4',
      'une certification européenne', 'un premier showroom'
    ];
    const FINALE = 'une audace et une vision commune';

    /* Seeded pile values — rotation (°), x-drift (px), y-drift (px) */
    const ROT = [ 4.2, -7.1,  3.8, -5.7,  8.1, -3.3,  6.8, -8.2,
                  2.9, -6.5,  7.7, -4.1,  9.2, -3.8,  5.1 ];
    const XD  = [  8,  -12,    5,   -6,   10,   -9,    6,   -4,
                   9,  -11,    3,   -8,   12,   -5,    7 ];
    const YD  = [  0,    4,   -5,    2,    6,   -3,    5,   -4,
                   3,   -6,    2,    5,   -3,    4,   -2 ];

    const LINE_H   = 24;   /* px between line baselines in the pile  */
    const FLY_MS   = 2200; /* fly-in duration per line                */
    const GAP_MS   = 560;  /* stagger: ms between each line starting  */
    const SETTLE_MS = 300; /* settle-rotation duration after landing   */

    const stage = document.getElementById('storyStage');

    /* Build pile lines — centered via left:50% + translateX(-50% + drift) */
    LINES.forEach((text, i) => {
      const el = document.createElement('span');
      el.className = 'story-line';
      el.textContent = text;
      el.style.top    = (i * LINE_H + YD[i]) + 'px';
      el.style.left   = '50%';
      el.style.transform = `translateX(calc(-50% + 110vw))`;
      stage.appendChild(el);
    });

    /* Build finale line — also centered */
    const finaleEl = document.createElement('span');
    finaleEl.className = 'story-finale';
    finaleEl.textContent = FINALE;
    const finaleTop = LINES.length * LINE_H + 62;
    finaleEl.style.top       = finaleTop + 'px';
    finaleEl.style.left      = '50%';
    finaleEl.style.transform = `translateX(calc(-50% + 110vw))`;
    stage.appendChild(finaleEl);

    /* Give stage explicit height so the page expands correctly */
    stage.style.minHeight = (finaleTop + 40) + 'px';

    /* ── Animate ── */
    function startAnimation() {
      const lineEls = stage.querySelectorAll('.story-line');

      lineEls.forEach((el, i) => {
        setTimeout(() => {
          /* Phase 1 — fly in from the right, land centered with drift */
          el.style.transition = `transform ${FLY_MS}ms cubic-bezier(0.12, 0.82, 0.22, 1)`;
          el.style.transform  = `translateX(calc(-50% + ${XD[i]}px)) rotate(0deg)`;

          /* Phase 2 — settle: slight random rotation (pile effect) */
          setTimeout(() => {
            el.style.transition = `transform ${SETTLE_MS}ms cubic-bezier(0.34, 1.4, 0.64, 1)`;
            el.style.transform  = `translateX(calc(-50% + ${XD[i]}px)) rotate(${ROT[i]}deg)`;
          }, FLY_MS + 40);

        }, i * GAP_MS);
      });

      /* Finale: enters after every pile line has settled */
      const finaleDelay = LINES.length * GAP_MS + FLY_MS + SETTLE_MS + 480;
      setTimeout(() => {
        /* Slower, weightier entrance — straight across, no rotation */
        finaleEl.style.transition = `transform ${FLY_MS + 500}ms cubic-bezier(0.08, 0.85, 0.18, 1)`;
        finaleEl.style.transform  = 'translateX(-50%)';
      }, finaleDelay);
    }

    /* Trigger when stage scrolls into view */
    const observer = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) {
        observer.disconnect();
        setTimeout(startAnimation, 250);
      }
    }, { threshold: 0.05 });
    observer.observe(stage);

    /* ── Hamburger / drawer ── */
    const hamburger   = document.getElementById('hamburger');
    const navClose    = document.getElementById('navClose');
    const navDrawer   = document.getElementById('navDrawer');
    const navBackdrop = document.getElementById('navBackdrop');

    function openNav() {
      navDrawer.classList.add('open');
      navBackdrop.classList.add('open');
      navDrawer.setAttribute('aria-hidden', 'false');
    }
    function closeNav() {
      navDrawer.classList.remove('open');
      navBackdrop.classList.remove('open');
      navDrawer.setAttribute('aria-hidden', 'true');
    }
    hamburger.addEventListener('click', openNav);
    navClose.addEventListener('click', closeNav);
    navBackdrop.addEventListener('click', closeNav);
  </script>
</body>
</html>
