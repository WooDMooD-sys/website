<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notre Histoire — La Start-up derrière WooDMooD | Poêle à Bûches Connecté</title>
  <meta name="description" content="WooDMooD est une start-up française fondée début 2024 par un père et son fils. Découvrez l'aventure derrière le premier poêle à bûches autonome et connecté, breveté et fabriqué en France.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://connectwoodmood.com/histoire.html">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="fr_FR">
  <meta property="og:url" content="https://connectwoodmood.com/histoire.html">
  <meta property="og:title" content="Notre Histoire — WooDMooD, la start-up du poêle à bûches connecté">
  <meta property="og:description" content="Une idée, un père, un fils, un brevet — l'aventure WooDMooD a commencé début 2024. Découvrez la start-up française derrière le poêle à bûches autonome.">
  <meta property="og:image" content="https://connectwoodmood.com/img/histoire/equipe-poele.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background: #000;
    }

    /* ── Fixed header ── */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 15vh;
      z-index: 100;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      padding: 0 6vw;
      background: rgba(0, 0, 0, 0.88);
      border-bottom: 1px solid rgba(255, 160, 50, 0.12);
    }

    .brand-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
    }

    .brand-logo {
      height: clamp(32px, 5vh, 58px);
      width: auto;
      display: block;
      filter: invert(1) opacity(0.68);
    }

    .brand-name {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-weight: normal;
      color: rgba(255, 255, 255, 0.68);
      white-space: nowrap;
      letter-spacing: 0.08em;
    }

    .header-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(22px, 3.8vw, 60px);
      padding-right: 0;
    }

    .wm-macaron-text {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      margin-right: -2vw;
    }

    .wm-macaron-text span {
      font-family: 'Montserrat', sans-serif;
      font-weight: bold;
      color: rgba(255, 160, 50, 0.88);
      letter-spacing: 0.06em;
      font-size: clamp(10px, 1.1vw, 15px);
      white-space: nowrap;
      text-align: right;
    }

    .header-nav a {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(13px, 1.35vw, 19px);
      font-weight: normal;
      color: rgba(255, 255, 255, 0.68);
      text-decoration: none;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .header-nav a:hover { color: rgba(255, 160, 50, 0.9); }
    .header-nav a.active { color: rgba(255, 160, 50, 0.9); }

    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px;
      z-index: 200;
    }
    .nav-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: rgba(255,255,255,0.75);
      border-radius: 2px;
    }

    @media (max-width: 768px) {
      .site-header { height: 60px; padding: 0 4vw; }
      .brand-logo { height: 28px; }
      .brand-name { font-size: 13px !important; }
      .wm-macaron-text { display: none; }
      .nav-toggle { display: flex; }
      .header-nav {
        display: none;
        position: fixed;
        top: 60px; left: 0; right: 0;
        background: rgba(0,0,0,0.96);
        flex-direction: column;
        align-items: center;
        gap: 0; padding: 0;
        z-index: 150;
        border-top: 1px solid rgba(255,160,50,0.2);
      }
      .header-nav.open { display: flex; }
      .header-nav a {
        width: 100%; text-align: center;
        padding: 18px 0; font-size: 14px;
        letter-spacing: 0.18em;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }

      /* Partners section: stack title above logos */
      .partners-section { grid-template-columns: 1fr; }
      .partners-left {
        flex-direction: column;
        align-items: center;
        gap: 10px;
        border-right: none;
        border-bottom: 1px solid rgba(255,160,50,0.12);
      }
      .partners-logos { width: 100%; height: 90px; }
      .partners-right { padding: 12px; }
      .partners-badge { height: 80px; }
    }

    /* ── Histoire content — grows to fill viewport ── */
    .page-content {
      background: #fff;
      padding: 0 8vw 40px;
      padding-top: 15vh;
      min-height: calc(100vh - 120px);
    }
    .page-content-inner { max-width: 760px; }

    .page-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 32px;
      font-weight: bold;
      color: rgba(0,0,0,0.85);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 14px;
      margin-bottom: 4px;
    }

    /* Intro sentence above the pile — centred across full page width */
    .story-intro {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-style: italic;
      font-weight: bold;
      color: rgba(255,160,50,0.88);
      letter-spacing: 0.04em;
      text-align: center;
      display: block;
      width: 100%;
      margin-bottom: 10px;
    }

    /* ── Story animation stage ── */
    .story-stage {
      position: relative;
      min-height: 320px;
      width: 100vw;
      margin-left: -8vw;
    }

    /* photo to the left of the word mosaic, aligned under the page title */
    .story-photo {
      position: absolute;
      left: 8vw;
      top: 0;
      height: 320px;
      width: auto;
      max-width: 38vw;
      object-fit: cover;
      border-radius: 4px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }

    @media (max-width: 620px) {
      .story-stage { min-height: 650px !important; }
      .story-photo {
        left: 50%;
        top: 0;
        transform: translateX(-50%);
        height: 320px;
        width: auto;
        max-width: 70vw;
      }
      .story-mosaic {
        left: 50% !important;
        top: 340px !important;
      }
      .story-finale {
        top: 521px !important;
        left: 50% !important;
        width: 70vw !important;
        white-space: normal !important;
        text-align: center !important;
      }
    }

    /* mosaic container */
    .story-mosaic {
      position: absolute;
      left: 54vw;
      top: 0;
      transform: translateX(-50%);
      width: 360px;
    }

    .story-line {
      position: absolute;
      display: block;
      font-family: 'Montserrat', sans-serif;
      line-height: 1.25;
      color: rgba(0,0,0,0.7);
      white-space: nowrap;
      opacity: 0;
      filter: blur(6px);
      transform: translateY(10px);
      transition: opacity 800ms cubic-bezier(0.25,0.46,0.45,0.94),
                  transform 800ms cubic-bezier(0.25,0.46,0.45,0.94),
                  filter 800ms cubic-bezier(0.25,0.46,0.45,0.94);
    }

    .story-line.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    .story-finale {
      /* matches .story-intro exactly */
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-style: italic;
      font-weight: bold;
      color: rgba(255,160,50,0.88);
      letter-spacing: 0.04em;
      text-align: center;
      opacity: 0;
      filter: blur(6px);
      transition: opacity 1000ms cubic-bezier(0.25,0.46,0.45,0.94),
                  transform 1000ms cubic-bezier(0.25,0.46,0.45,0.94),
                  filter 1000ms cubic-bezier(0.25,0.46,0.45,0.94);
    }

    .story-finale.visible {
      opacity: 1;
      filter: blur(0);
    }

    @media (max-width: 620px) {
      .story-mosaic { width: 92vw; transform: translateX(-50%) scale(0.72); transform-origin: top center; }
    }

    /* ── Partenaires section ── */
    .partners-section {
      background: #000;
      display: grid;
      grid-template-columns: 3fr 1fr;
      border-top: 1px solid rgba(255,160,50,0.15);
    }

    .partners-left {
      display: flex;
      align-items: center;
      gap: 3vw;
      padding: 16px 4vw;
      border-right: 1px solid rgba(255,160,50,0.12);
    }

    .partners-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: bold;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .partners-logos {
      position: relative;
      flex: 1;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .partner-logo {
      position: absolute;
      opacity: 0;
      transition: opacity 0.7s ease;
      height: 75px;
      width: auto;
      max-width: 240px;
      object-fit: contain;
      filter: brightness(1.8) opacity(0.85);
    }

    .partner-logo.visible { opacity: 1; }

    .partners-right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .partners-badge {
      height: 100px;
      width: auto;
      filter: invert(1);
    }
  </style>
</head>
<body>

  <!-- Fixed header -->
  <header class="site-header">
    <a href="index.html" class="brand-wrap" id="brandWrap">
      <img src="logo.png" class="brand-logo" id="brandLogo" alt="WooDMooD logo">
      <span class="brand-name" id="brandName">WooDMooD</span>
    </a>
    <nav class="header-nav" id="headerNav">
      <a href="histoire.html" class="active">Histoire</a>
      <a href="produits.html">Produit</a>
      <a href="showrooms.html">Showrooms</a>
      <a href="contact.html">Contact</a>
    </nav>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="wm-macaron-text"><span>Poêles à Bûches</span><span>Autonomes et Connectés</span></div>
  </header>

  <!-- Histoire content -->
  <section class="page-content">
    <div class="page-content-inner">
      <h1 class="page-title">Histoire</h1>
    </div>
    <p class="story-intro">L'aventure a commencé début 2024</p>
    <div id="storyStage" class="story-stage">
      <img src="img/histoire/equipe-poele.jpg" alt="L'équipe WooDMooD avec le poêle à bûches" class="story-photo">
    </div>
  </section>

  <!-- Partenaires -->
  <section class="partners-section">
    <div class="partners-left">
      <p class="partners-title">Nos Partenaires</p>
      <div class="partners-logos" id="partnersLogos">
        <img src="img/partners/logo-3g.jpg"         class="partner-logo visible" alt="3G">
        <img src="img/partners/logo-inpi.jpg"        class="partner-logo"         alt="INPI">
        <img src="img/partners/logo-anjou.png"       class="partner-logo"         alt="Init Anjou"         style="height:120px;">
        <img src="img/partners/logo-technopole.png"  class="partner-logo"         alt="Angers Technopole"  style="height:120px;">
        <img src="img/partners/logo-bpi.jpg"         class="partner-logo"         alt="BPI">
        <img src="img/partners/logo-som.jpg"         class="partner-logo"         alt="SOM">
      </div><!-- partners-logos -->
    </div><!-- partners-left -->
    <div class="partners-right">
      <img src="brevet.png" class="partners-badge" alt="Breveté — Patented Product">
    </div>
  </section>

  <script>
    document.getElementById('navToggle').addEventListener('click', function() {
      document.getElementById('headerNav').classList.toggle('open');
    });
    document.getElementById('headerNav').querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() { document.getElementById('headerNav').classList.remove('open'); });
    });
  </script>
  <script>
    /* ── Story animation — centred typographic mosaic ── */
    /*
      Layout: each phrase is positioned (x, y) within a 560px-wide container
      centred in the stage. Sizes vary to create visual hierarchy.
      Animation: blur→sharp + fade + gentle float-up, staggered 360ms apart.
    */
    const WORDS = [
      /* text                             x    y   size  bold */
      { t: 'un besoin',                   x:  0, y:   0, s: 10, b: false },
      { t: 'une idée',                    x:112, y:  -3, s: 24, b: true  },
      { t: 'un père',                     x:  0, y:  20, s: 26, b: true  },
      { t: 'un fils',                     x:172, y:  20, s: 26, b: true  },
      { t: 'un projet',                   x: 14, y:  62, s: 15, b: false },
      { t: 'un brevet',                   x:126, y:  57, s: 22, b: true  },
      { t: 'des partenaires',             x:  0, y:  88, s: 12, b: false },
      { t: 'une start-up',                x:152, y:  84, s: 18, b: true  },
      { t: 'un atelier',                  x:  0, y: 108, s: 30, b: true  },
      { t: 'un atelier plus grand',       x: 16, y: 146, s: 11, b: false },
      { t: 'un prototype',                x:  0, y: 164, s: 20, b: true  },
      { t: 'puis 2',                      x:172, y: 170, s: 10, b: false },
      { t: 'puis 3 et 4',                 x:224, y: 170, s: 10, b: false },
      { t: 'une certification européenne',x:  0, y: 190, s:  9, b: false },
      { t: 'un premier showroom',         x:  4, y: 208, s: 21, b: true  },
    ];
    const FINALE_Y = 248;
    const GAP_MS   = 360;

    const stage = document.getElementById('storyStage');

    window.addEventListener('load', () => {
      /* ── centred container ── */
      const mosaic = document.createElement('div');
      mosaic.className = 'story-mosaic';
      stage.appendChild(mosaic);

      /* ── word spans ── */
      WORDS.forEach(w => {
        const el = document.createElement('span');
        el.className        = 'story-line';
        el.textContent      = w.t;
        el.style.left       = w.x + 'px';
        el.style.top        = w.y + 'px';
        el.style.fontSize   = w.s + 'px';
        el.style.fontWeight = w.b ? 'bold' : 'normal';
        mosaic.appendChild(el);
      });

      /* ── finale — appended to stage so left:50% = full stage centre ── */
      const fin = document.createElement('span');
      fin.className    = 'story-finale';
      fin.textContent  = 'une audace et une vision commune';
      fin.style.top    = (FINALE_Y) + 'px';
      stage.appendChild(fin);

      /* give stage enough room */
      stage.style.minHeight = (FINALE_Y + 50) + 'px';

      /* ── trigger on scroll into view ── */
      const observer = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) {
          observer.disconnect();
          setTimeout(startAnimation, 300);
        }
      }, { threshold: 0.05 });
      observer.observe(stage);
    });

    function startAnimation() {
      const lines = stage.querySelectorAll('.story-line');
      lines.forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * GAP_MS);
      });
      const fin = stage.querySelector('.story-finale');
      setTimeout(() => fin.classList.add('visible'), lines.length * GAP_MS + 400);
    }

  </script>

  <script>
    /* ── Fit "WooDMooD" name to exactly the logo's rendered width ── */
    function fitBrandName() {
      const logo = document.getElementById('brandLogo');
      const name = document.getElementById('brandName');
      const logoW = logo.offsetWidth;
      if (!logoW) return;
      let lo = 6, hi = 80, mid;
      name.style.letterSpacing = '0.06em';
      for (let i = 0; i < 20; i++) {
        mid = (lo + hi) / 2;
        name.style.fontSize = mid + 'px';
        if (name.offsetWidth < logoW) lo = mid; else hi = mid;
      }
    }
    if (document.readyState === 'complete') fitBrandName();
    else window.addEventListener('load', fitBrandName);
    window.addEventListener('resize', fitBrandName);
  </script>

  <script>
    /* ── Partner logo rotation every 2s ── */
    const logos = document.querySelectorAll('#partnersLogos .partner-logo');
    let current = 0;
    setInterval(() => {
      logos[current].classList.remove('visible');
      current = (current + 1) % logos.length;
      logos[current].classList.add('visible');
    }, 2000);
  </script>
</body>
</html>
