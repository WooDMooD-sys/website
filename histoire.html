<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histoire — WooDMooD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background: #000;
    }

    /* ── Fixed header ── */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 15vh;
      z-index: 100;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      padding: 0 6vw;
      background: rgba(0, 0, 0, 0.88);
      border-bottom: 1px solid rgba(255, 160, 50, 0.12);
    }

    .brand-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
    }

    .brand-logo {
      height: clamp(32px, 5vh, 58px);
      width: auto;
      display: block;
      filter: invert(1) opacity(0.68);
    }

    .brand-name {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-weight: normal;
      color: rgba(255, 255, 255, 0.68);
      white-space: nowrap;
      letter-spacing: 0.08em;
    }

    .header-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(22px, 3.8vw, 60px);
      padding-right: 0;
    }

    .wm-macaron {
      height: clamp(50px, 11vh, 110px);
      width: auto;
      display: block;
      margin-right: -2vw;
    }

    .header-nav a {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: clamp(13px, 1.35vw, 19px);
      font-weight: normal;
      color: rgba(255, 255, 255, 0.68);
      text-decoration: none;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .header-nav a:hover { color: rgba(255, 160, 50, 0.9); }
    .header-nav a.active { color: rgba(255, 160, 50, 0.9); }

    /* ── Histoire content ── */
    .page-content {
      background: #fff;
      padding: 0 8vw 18px;
      padding-top: 15vh;
    }
    .page-content-inner { max-width: 760px; }

    .page-title {
      font-family: 'Georgia', serif;
      font-size: 32px;
      font-weight: bold;
      color: rgba(0,0,0,0.85);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 28px;
      margin-bottom: 6px;
    }

    /* Intro sentence above the pile — centred across full page width */
    .story-intro {
      font-family: 'Georgia', serif;
      font-size: 20px;
      font-style: italic;
      font-weight: bold;
      color: rgba(255,160,50,0.88);
      letter-spacing: 0.04em;
      text-align: center;
      display: block;
      width: 100%;
      margin-bottom: 10px;
    }

    /* ── Story animation stage ── */
    .story-stage {
      position: relative;
      min-height: 520px;
    }

    .story-line {
      position: absolute;
      display: block;
      font-family: 'Georgia', serif;
      font-size: 19px;
      line-height: 1.4;
      color: rgba(0,0,0,0.65);
      white-space: nowrap;
      will-change: transform;
      transform-origin: center center;
    }

    .story-finale {
      position: absolute;
      display: block;
      font-family: 'Georgia', serif;
      font-size: 20px;
      line-height: 1.4;
      color: rgba(255,160,50,0.88);
      white-space: nowrap;
      font-style: italic;
      font-weight: bold;
      letter-spacing: 0.04em;
      will-change: transform;
      transform-origin: center center;
    }

    /* ── Partenaires section ── */
    .partners-section {
      background: #000;
      display: grid;
      grid-template-columns: 3fr 1fr;
      border-top: 1px solid rgba(255,160,50,0.15);
      min-height: 120px;
    }

    .partners-left {
      display: flex;
      align-items: center;
      gap: 5vw;
      padding: 28px 6vw;
      border-right: 1px solid rgba(255,160,50,0.12);
    }

    .partners-title {
      font-family: 'Georgia', serif;
      font-size: 24px;
      font-weight: bold;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .partners-logos {
      position: relative;
      flex: 1;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .partner-logo {
      position: absolute;
      opacity: 0;
      transition: opacity 0.7s ease;
      height: 55px;
      width: auto;
      filter: brightness(1.8) opacity(0.85);
    }

    .partner-logo.visible { opacity: 1; }

    .partners-right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .partners-badge {
      height: clamp(90px, 13vh, 150px);
      width: auto;
      filter: invert(1);
    }
  </style>
</head>
<body>

  <!-- Fixed header -->
  <header class="site-header">
    <a href="index.html" class="brand-wrap" id="brandWrap">
      <img src="logo.png" class="brand-logo" id="brandLogo" alt="WooDMooD logo">
      <span class="brand-name" id="brandName">WooDMooD</span>
    </a>
    <nav class="header-nav">
      <a href="histoire.html" class="active">Histoire</a>
      <a href="produits.html">Produits</a>
      <a href="showrooms.html">Showrooms</a>
      <a href="contact.html">Contact</a>
    </nav>
    <img src="Gemini_Generated_Image_9tt4nn9tt4nn9tt4__2_-removebg-preview.png" class="wm-macaron" alt="WooDMooD">
  </header>

  <!-- Histoire content -->
  <section class="page-content">
    <div class="page-content-inner">

      <svg class="partner-logo visible" viewBox="0 0 160 60" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="56" height="56" rx="8" fill="none" stroke="rgba(255,160,50,0.9)" stroke-width="2.5"/>
        <line x1="14" y1="30" x2="44" y2="30" stroke="rgba(255,160,50,0.9)" stroke-width="2.5"/>
        <line x1="29" y1="15" x2="29" y2="45" stroke="rgba(255,160,50,0.9)" stroke-width="2.5"/>
        <text x="70" y="26" font-size="15" font-weight="bold" fill="rgba(255,255,255,0.85)" font-family="Georgia,serif" letter-spacing="2">ATELIER</text>
        <text x="70" y="46" font-size="12" fill="rgba(255,255,255,0.5)" font-family="Georgia,serif" letter-spacing="1">fabrication</text>
      </svg>
      <svg class="partner-logo" viewBox="0 0 160 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="24" fill="none" stroke="rgba(255,160,50,0.9)" stroke-width="2.5"/>
        <circle cx="30" cy="30" r="10" fill="rgba(255,160,50,0.9)"/>
        <text x="66" y="26" font-size="15" font-weight="bold" fill="rgba(255,255,255,0.85)" font-family="Georgia,serif" letter-spacing="2">INNOVA</text>
        <text x="66" y="46" font-size="12" fill="rgba(255,255,255,0.5)" font-family="Georgia,serif" letter-spacing="1">technologie</text>
      </svg>
      <svg class="partner-logo" viewBox="0 0 160 60" xmlns="http://www.w3.org/2000/svg">
        <polygon points="30,6 54,30 30,54 6,30" fill="none" stroke="rgba(255,160,50,0.9)" stroke-width="2.5"/>
        <text x="66" y="26" font-size="15" font-weight="bold" fill="rgba(255,255,255,0.85)" font-family="Georgia,serif" letter-spacing="2">FOYER</text>
        <text x="66" y="46" font-size="12" fill="rgba(255,255,255,0.5)" font-family="Georgia,serif" letter-spacing="1">distribution</text>
      </svg>
      <svg class="partner-logo" viewBox="0 0 160 60" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="18" width="48" height="24" rx="12" fill="none" stroke="rgba(255,160,50,0.9)" stroke-width="2.5"/>
        <rect x="14" y="24" width="12" height="12" rx="6" fill="rgba(255,160,50,0.9)"/>
        <text x="66" y="26" font-size="15" font-weight="bold" fill="rgba(255,255,255,0.85)" font-family="Georgia,serif" letter-spacing="2">NEXIO</text>
        <text x="66" y="46" font-size="12" fill="rgba(255,255,255,0.5)" font-family="Georgia,serif" letter-spacing="1">connectivité</text>

        <text x="66" y="26" font-size="15" font-weight="bold" fill="rgba(255,255,255,0.85)" font-family="Georgia,serif" letter-spacing="2">CALOR</text>
        <text x="66" y="46" font-size="12" fill="rgba(255,255,255,0.5)" font-family="Georgia,serif" letter-spacing="1">énergie</text>
      </svg>
      </div><!-- partners-logos -->
    </div><!-- partners-left -->
    <div class="partners-right">
      <img src="brevet.png" class="partners-badge" alt="Breveté — Patented Product">
    </div>
  </section>

  <script>
    /* ── Story animation ── */
    const LINES = [
      'un besoin', 'une idée', 'un père', 'un fils', 'un projet',
      'un brevet', 'des partenaires', 'une start-up', 'un atelier',
      'un atelier plus grand', 'un prototype', 'puis 2', 'puis 3 et 4',
      'une certification européenne', 'un premier showroom'
    ];
    const FINALE = 'une audace et une vision commune';

    /* Seeded pile values — rotation (°), x-drift (px), y-drift (px) */
    const ROT = [ 4.2, -7.1,  3.8, -5.7,  8.1, -3.3,  6.8, -8.2,
                  2.9, -6.5,  7.7, -4.1,  9.2, -3.8,  5.1 ];
    const XD  = [  8,  -12,    5,   -6,   10,   -9,    6,   -4,
                   9,  -11,    3,   -8,   12,   -5,    7 ];
    const YD  = [  0,    4,   -5,    2,    6,   -3,    5,   -4,
                   3,   -6,    2,    5,   -3,    4,   -2 ];

    const LINE_H   = 17;   /* px between line baselines in the pile  */
    const FLY_MS   = 2200; /* fly-in duration per line                */
    const GAP_MS   = 560;  /* stagger: ms between each line starting  */
    const SETTLE_MS = 300; /* settle-rotation duration after landing   */

    const stage = document.getElementById('storyStage');
    let finaleEl;

    /* Build story after full page load so getBoundingClientRect is accurate */
    window.addEventListener('load', () => {
      /* Align pile center with WOOD MOOD lettering (both at 50vw) */
      const stageCenterPx = window.innerWidth * 0.5 - stage.getBoundingClientRect().left;

      /* Build pile lines — centered at viewport center */
      LINES.forEach((text, i) => {
        const el = document.createElement('span');
        el.className = 'story-line';
        el.textContent = text;
        el.style.top    = (i * LINE_H + YD[i]) + 'px';
        el.style.left   = stageCenterPx + 'px';
        el.style.transform = `translateX(calc(-50% + 110vw))`;
        stage.appendChild(el);
      });

      /* Build finale line — also centered at viewport center */
      finaleEl = document.createElement('span');
      finaleEl.className = 'story-finale';
      finaleEl.textContent = FINALE;
      const finaleTop = LINES.length * LINE_H + 16;
      finaleEl.style.top       = finaleTop + 'px';
      finaleEl.style.left      = stageCenterPx + 'px';
      finaleEl.style.transform = `translateX(calc(-50% + 110vw))`;
      stage.appendChild(finaleEl);

      /* Give stage explicit height so the page expands correctly */
      stage.style.minHeight = (finaleTop + 40) + 'px';

      /* Trigger animation when stage scrolls into view */
      const observer = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) {
          observer.disconnect();
          setTimeout(startAnimation, 250);
        }
      }, { threshold: 0.05 });
      observer.observe(stage);
    });

    /* ── Animate ── */
    function startAnimation() {
      const lineEls = stage.querySelectorAll('.story-line');

      lineEls.forEach((el, i) => {
        setTimeout(() => {
          /* Phase 1 — fly in from the right, land centered with drift */
          el.style.transition = `transform ${FLY_MS}ms cubic-bezier(0.12, 0.82, 0.22, 1)`;
          el.style.transform  = `translateX(calc(-50% + ${XD[i]}px)) rotate(0deg)`;

          /* Phase 2 — settle: slight random rotation (pile effect) */
          setTimeout(() => {
            el.style.transition = `transform ${SETTLE_MS}ms cubic-bezier(0.34, 1.4, 0.64, 1)`;
            el.style.transform  = `translateX(calc(-50% + ${XD[i]}px)) rotate(${ROT[i]}deg)`;
          }, FLY_MS + 40);

        }, i * GAP_MS);
      });

      /* Finale: enters after every pile line has settled */
      const finaleDelay = LINES.length * GAP_MS + FLY_MS + SETTLE_MS + 480;
      setTimeout(() => {
        /* Slower, weightier entrance — straight across, no rotation */
        finaleEl.style.transition = `transform ${FLY_MS + 500}ms cubic-bezier(0.08, 0.85, 0.18, 1)`;
        finaleEl.style.transform  = 'translateX(-50%)';
      }, finaleDelay);
    }

  </script>

  <script>
    /* ── Fit "WooDMooD" name to exactly the logo's rendered width ── */
    function fitBrandName() {
      const logo = document.getElementById('brandLogo');
      const name = document.getElementById('brandName');
      const logoW = logo.offsetWidth;
      if (!logoW) return;
      let lo = 6, hi = 80, mid;
      name.style.letterSpacing = '0.06em';
      for (let i = 0; i < 20; i++) {
        mid = (lo + hi) / 2;
        name.style.fontSize = mid + 'px';
        if (name.offsetWidth < logoW) lo = mid; else hi = mid;
      }
    }
    if (document.readyState === 'complete') fitBrandName();
    else window.addEventListener('load', fitBrandName);
    window.addEventListener('resize', fitBrandName);
  </script>

  <script>
    /* ── Partner logo rotation every 2s ── */
    const logos = document.querySelectorAll('#partnersLogos .partner-logo');
    let current = 0;
    setInterval(() => {
      logos[current].classList.remove('visible');
      current = (current + 1) % logos.length;
      logos[current].classList.add('visible');
    }, 2000);
  </script>
</body>
