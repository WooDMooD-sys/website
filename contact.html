<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — WooDMooD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background: #000;
    }

    /* ── Fixed header ── */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 15vh;
      z-index: 100;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      padding: 0 6vw;
      background: rgba(0, 0, 0, 0.88);
      border-bottom: 1px solid rgba(255, 160, 50, 0.12);
    }

    .brand-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
    }

    .brand-logo {
      height: clamp(28px, 4.5vh, 52px);
      width: auto;
      display: block;
      filter: invert(1) opacity(0.68);
    }

    .header-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(22px, 3.8vw, 60px);
    }

    .wm-macaron {
      height: clamp(50px, 11vh, 110px);
      width: auto;
      display: block;
    }

    .header-nav a {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: clamp(13px, 1.35vw, 19px);
      font-weight: normal;
      color: rgba(255, 255, 255, 0.68);
      text-decoration: none;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .header-nav a:hover { color: rgba(255, 160, 50, 0.9); }
    .header-nav a.active { color: rgba(255, 160, 50, 0.9); }

    /* ── Page content ── */
    .page-content {
      background: #000;
      border-top: 1px solid rgba(255,160,50,0.1);
      padding: 40px 8vw 120px;
      padding-top: 15vh;
    }

    .page-content-inner { max-width: 760px; }

    .page-title {
      font-family: 'Georgia', serif;
      font-size: 32px;
      font-weight: bold;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ── Contact rows ── */
    .contact-list {
      border-top: 1px solid rgba(255,160,50,0.1);
    }

    .contact-row {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 40px;
      align-items: start;
      padding: 36px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .contact-label {
      font-family: 'Georgia', serif;
      font-size: 12px;
      font-weight: bold;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding-top: 3px;
    }

    .contact-details {
      font-family: 'Georgia', serif;
      font-size: 15px;
      line-height: 2;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.03em;
    }

    .contact-details a {
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      transition: color 0.2s;
    }
    .contact-details a:hover { color: rgba(255,160,50,0.9); }

    .contact-type {
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 2px;
    }

    @media (max-width: 560px) {
      .contact-row { grid-template-columns: 1fr; gap: 12px; }
    }
  </style>
</head>
<body>

  <!-- Fixed header -->
  <header class="site-header">
    <a href="index.html" class="brand-wrap">
      <img src="logo.png" class="brand-logo" alt="WooDMooD logo">
    </a>
    <nav class="header-nav">
      <a href="index.html">Home</a>
      <a href="histoire.html">Histoire</a>
      <a href="produits.html">Produits</a>
      <a href="showrooms.html">Showrooms</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
    <img src="Gemini_Generated_Image_9tt4nn9tt4nn9tt4__2_-removebg-preview.png" class="wm-macaron" alt="WooDMooD">
  </header>

  <!-- Contact content -->
  <section class="page-content">
    <div class="page-content-inner">

      <h1 class="page-title">Contact</h1>

      <div class="contact-list">

        <div class="contact-row">
          <span class="contact-label">Contact</span>
          <div class="contact-details">
            <span class="contact-type">Par email</span>
            <a href="mailto:connectwoodmood@gmail.com">connectwoodmood@gmail.com</a>
            <br>
            <span class="contact-type" style="margin-top: 14px;">Par téléphone</span>
            <a href="tel:+33650771660">06 50 77 16 60</a>
          </div>
        </div>

      </div>

    </div>
  </section>

  <script>
  </script>
</body>
</html>
