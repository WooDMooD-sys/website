<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — WooDMooD</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background: #000;
    }

    /* ── Fixed header ── */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 15vh;
      z-index: 100;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      padding: 0 6vw;
      background: rgba(0, 0, 0, 0.88);
      border-bottom: 1px solid rgba(255, 160, 50, 0.12);
    }

    .brand-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
    }

    .brand-logo {
      height: clamp(32px, 5vh, 58px);
      width: auto;
      display: block;
      filter: invert(1) opacity(0.68);
    }

    .brand-name {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-weight: normal;
      color: rgba(255, 255, 255, 0.68);
      white-space: nowrap;
      letter-spacing: 0.08em;
    }

    .header-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(22px, 3.8vw, 60px);
    }

    .wm-macaron-text {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      margin-right: -2vw;
    }

    .wm-macaron-text span {
      font-family: 'Montserrat', sans-serif;
      font-weight: bold;
      color: rgba(255, 160, 50, 0.88);
      letter-spacing: 0.06em;
      font-size: clamp(10px, 1.1vw, 15px);
      white-space: nowrap;
      text-align: right;
    }

    .header-nav a {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(13px, 1.35vw, 19px);
      font-weight: normal;
      color: rgba(255, 255, 255, 0.68);
      text-decoration: none;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .header-nav a:hover { color: rgba(255, 160, 50, 0.9); }
    .header-nav a.active { color: rgba(255, 160, 50, 0.9); }

    /* ── Page content ── */
    .page-content {
      background: #000;
      border-top: 1px solid rgba(255,160,50,0.1);
      padding: 40px 8vw 120px;
      padding-top: 15vh;
    }

    .page-content-inner { max-width: 760px; }

    .page-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 32px;
      font-weight: bold;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ── Contact rows ── */
    .contact-list {
      border-top: 1px solid rgba(255,160,50,0.1);
    }

    .contact-row {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 40px;
      align-items: start;
      padding: 36px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .contact-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: bold;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding-top: 3px;
    }

    .contact-details {
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      line-height: 2;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.03em;
    }

    .contact-details a {
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      transition: color 0.2s;
    }
    .contact-details a:hover { color: rgba(255,160,50,0.9); }

    .contact-type {
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 2px;
    }

    /* ── Contact form ── */
    .contact-form {
      margin-top: 48px;
      border-top: 1px solid rgba(255,160,50,0.1);
      padding-top: 36px;
    }

    .contact-form h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: bold;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group.full { grid-column: 1 / -1; }

    .form-group label {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,160,50,0.2);
      border-radius: 2px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: rgba(255,160,50,0.55);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }

    .form-group select option {
      background: #111;
      color: rgba(255,255,255,0.75);
    }

    .form-submit {
      margin-top: 8px;
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,160,50,0.88);
      background: transparent;
      border: 1px solid rgba(255,160,50,0.4);
      padding: 14px 36px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      border-radius: 2px;
    }

    .form-submit:hover {
      background: rgba(255,160,50,0.08);
      border-color: rgba(255,160,50,0.75);
    }

    .radio-group {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      padding: 10px 0;
    }

    .radio-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      letter-spacing: 0.04em;
    }

    .radio-label input[type="radio"] {
      accent-color: rgba(255,160,50,0.88);
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .form-success {
      display: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      color: rgba(255,160,50,0.88);
      font-style: italic;
      margin-top: 20px;
    }

    @media (max-width: 560px) {
      .form-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .contact-row { grid-template-columns: 1fr; gap: 12px; }
    }

    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px;
      z-index: 200;
    }
    .nav-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: rgba(255,255,255,0.75);
      border-radius: 2px;
    }

    @media (max-width: 768px) {
      .site-header { height: 60px; padding: 0 4vw; }
      .brand-logo { height: 28px; }
      .brand-name { font-size: 13px !important; }
      .wm-macaron-text { display: none; }
      .nav-toggle { display: flex; }
      .header-nav {
        display: none;
        position: fixed;
        top: 60px; left: 0; right: 0;
        background: rgba(0,0,0,0.96);
        flex-direction: column;
        align-items: center;
        gap: 0; padding: 0;
        z-index: 150;
        border-top: 1px solid rgba(255,160,50,0.2);
      }
      .header-nav.open { display: flex; }
      .header-nav a {
        width: 100%; text-align: center;
        padding: 18px 0; font-size: 14px;
        letter-spacing: 0.18em;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
    }
  </style>
</head>
<body>

  <!-- Fixed header -->
  <header class="site-header">
    <a href="index.html" class="brand-wrap" id="brandWrap">
      <img src="logo.png" class="brand-logo" id="brandLogo" alt="WooDMooD logo">
      <span class="brand-name" id="brandName">WooDMooD</span>
    </a>
    <nav class="header-nav" id="headerNav">
      <a href="histoire.html">Histoire</a>
      <a href="produits.html">Produits</a>
      <a href="showrooms.html">Showrooms</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="wm-macaron-text"><span>Poêles à Bûches</span><span>Autonomes et Connectés</span></div>
  </header>

  <!-- Contact content -->
  <section class="page-content">
    <div class="page-content-inner">

      <h1 class="page-title">Contact</h1>

      <div class="contact-list">

        <div class="contact-row">
          <span class="contact-label">Contact</span>
          <div class="contact-details">
            <span class="contact-type">Par email</span>
            <a href="mailto:connectwoodmood@gmail.com">connectwoodmood@gmail.com</a>
            <br>
            <span class="contact-type" style="margin-top: 14px;">Par téléphone</span>
            <a href="tel:+33650771660">06 50 77 16 60</a>
          </div>
        </div>

      </div>

      <!-- ── Google Form embed ── -->
      <div class="contact-form">
        <h2>Envoyer un message</h2>
        <iframe
          src="https://docs.google.com/forms/d/e/1FAIpQLSeQkRdndNfMz9y0a9Uxk9xnsj5fFOPg_MfRXo_sOAs8PcKIXg/viewform?embedded=true"
          width="100%"
          height="900"
          frameborder="0"
          marginheight="0"
          marginwidth="0"
          style="border:none; background:transparent;">
          Chargement…
        </iframe>
      </div>

    </div>
  </section>

  <script>
    document.getElementById('navToggle').addEventListener('click', function() {
      document.getElementById('headerNav').classList.toggle('open');
    });
    document.getElementById('headerNav').querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() { document.getElementById('headerNav').classList.remove('open'); });
    });
  </script>
  <script>
    function fitBrandName() {
      const logo = document.getElementById('brandLogo');
      const name = document.getElementById('brandName');
      const logoW = logo.offsetWidth;
      if (!logoW) return;
      let lo = 6, hi = 80, mid;
      name.style.letterSpacing = '0.06em';
      for (let i = 0; i < 20; i++) {
        mid = (lo + hi) / 2;
        name.style.fontSize = mid + 'px';
        if (name.offsetWidth < logoW) lo = mid; else hi = mid;
      }
    }
    if (document.readyState === 'complete') fitBrandName();
    else window.addEventListener('load', fitBrandName);
    window.addEventListener('resize', fitBrandName);
  </script>
</body>
</html>
