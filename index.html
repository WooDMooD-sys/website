<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WoodMood</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background: #000;
    }

    /* ── Fixed header ── */
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 8vw;
    }

    .hamburger {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 4px;
      pointer-events: all;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: rgba(255, 255, 255, 0.7);
      transition: background 0.2s;
    }

    .hamburger:hover span {
      background: rgba(255, 160, 50, 0.9);
    }

    .brand {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 18px;
      font-weight: normal;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.04em;
    }

    /* ── Side nav drawer ── */
    .nav-drawer {
      position: fixed;
      top: 0;
      left: -300px;
      width: 280px;
      height: 100vh;
      background: #0c0c0c;
      border-right: 1px solid rgba(255, 160, 50, 0.12);
      z-index: 200;
      transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      padding: 32px 0;
    }

    .nav-drawer.open { left: 0; }

    .nav-close {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 18px;
      cursor: pointer;
      align-self: flex-end;
      margin-right: 28px;
      margin-bottom: 32px;
      line-height: 1;
      transition: color 0.2s;
    }

    .nav-close:hover { color: rgba(255, 160, 50, 0.9); }

    .nav-drawer ul {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .nav-drawer ul li a {
      display: block;
      padding: 16px 32px;
      font-family: 'Georgia', serif;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s, padding-left 0.2s;
    }

    .nav-drawer ul li a:hover {
      color: rgba(255, 160, 50, 0.9);
      padding-left: 40px;
    }

    .nav-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 150;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .nav-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Hero section ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .dark-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 1;
    }

    /* Icons pinned to bottom of hero, above overlay */
    .features {
      position: absolute;
      bottom: 44px;
      left: 0;
      right: 0;
      z-index: 2;
      display: flex;
      justify-content: center;
      gap: clamp(24px, 5vw, 64px);
    }

    .feature {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .feature svg {
      width: 42px;
      height: 42px;
      fill: none;
      stroke: rgba(255, 160, 50, 0.72);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .feature svg .dot {
      fill: rgba(255, 160, 50, 0.72);
      stroke: none;
    }

    .feature-label {
      font-family: 'Georgia', serif;
      font-size: 10px;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.6;
    }

    /* ── Feature sections ── */
    .feat-sections {
      background: #080808;
      border-top: 1px solid rgba(255, 160, 50, 0.1);
      padding: 0 8vw;
    }

    .feat-row {
      display: flex;
      align-items: flex-start;
      gap: 48px;
      padding: 56px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      max-width: 860px;
    }

    .feat-row:last-child { border-bottom: none; }

    .feat-row-icon {
      flex-shrink: 0;
      padding-top: 4px;
    }

    .feat-row-icon svg {
      width: 42px;
      height: 42px;
      fill: none;
      stroke: rgba(255, 160, 50, 0.72);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .feat-row-icon svg .dot {
      fill: rgba(255, 160, 50, 0.72);
      stroke: none;
    }

    .feat-row-title {
      font-family: 'Georgia', serif;
      font-size: 10px;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .feat-row-text {
      font-family: 'Georgia', serif;
      font-size: 15px;
      line-height: 1.85;
      color: rgba(255, 255, 255, 0.38);
    }
  </style>
</head>

  <script>
    /* ── Canvas text mask ── */
    function applyTextMask() {
      const overlay  = document.querySelector('.dark-overlay');
      const dpr = window.devicePixelRatio || 1;
      const w   = window.innerWidth;
      const h   = window.innerHeight;

      const canvas  = document.createElement('canvas');
      canvas.width  = w * dpr;
      canvas.height = h * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, w, h);

      ctx.globalCompositeOperation = 'destination-out';

      const fontSize   = Math.min(300, Math.max(80, Math.min(w * 0.19, h * 0.28)));
      const lineHeight = fontSize * 0.85;
      const topY  = h * 0.42 - (lineHeight * 2 * 0.54);
      const centerX = w * 0.5;

      ctx.font         = `${fontSize}px Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'top';
      ctx.fillStyle    = 'black';

      const xStretch = 1.45;
      ctx.save();
      ctx.scale(xStretch, 1);
      ctx.fillText('WOOD', centerX / xStretch, topY);
      ctx.fillText('MOOD', centerX / xStretch, topY + lineHeight);
      ctx.restore();

      const url = canvas.toDataURL('image/png');
      overlay.style.webkitMaskImage  = `url(${url})`;
      overlay.style.maskImage        = `url(${url})`;
      overlay.style.webkitMaskSize   = '100% 100%';
      overlay.style.maskSize         = '100% 100%';
      overlay.style.webkitMaskRepeat = 'no-repeat';
      overlay.style.maskRepeat       = 'no-repeat';
    }

    document.fonts.ready.then(applyTextMask);
    window.addEventListener('resize', applyTextMask);

    /* ── Hamburger / drawer ── */
    const hamburger   = document.getElementById('hamburger');
    const navClose    = document.getElementById('navClose');
    const navDrawer   = document.getElementById('navDrawer');
    const navBackdrop = document.getElementById('navBackdrop');

    function openNav() {
      navDrawer.classList.add('open');
      navBackdrop.classList.add('open');
      navDrawer.setAttribute('aria-hidden', 'false');
    }

    function closeNav() {
      navDrawer.classList.remove('open');
      navBackdrop.classList.remove('open');
      navDrawer.setAttribute('aria-hidden', 'true');
    }

    hamburger.addEventListener('click', openNav);
    navClose.addEventListener('click', closeNav);
    navBackdrop.addEventListener('click', closeNav);
  </script>
